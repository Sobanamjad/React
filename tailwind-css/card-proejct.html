<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Project</title>
    <link rel="stylesheet" href="card.css">
</head>
<body>
    <header class="sticky-header">
        <h1>My Profile</h1>
    </header>

    <section class="profile-card">
        <div class="badge">🌟</div>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSw2dAVNmBhqVvNPAs7LJHnumSH3pHdoWP0bg&s" alt="">
        <h2 class="name">Soban Amjad</h2>
        <p class="bio">I am a passionate web developer with expertise in creating responsive and user-friendly websites 
            using modern technologies like HTML, CSS, and JavaScript.
        </p>
        <div class="stats">
            <div class="stat"><h3>130</h3>
            <p>Projects</p>
            </div>
            <div class="stat"><h3>85+</h3>
            <p>Clients</p>
            </div>
            <div class="stat"><h3>10+</h3>
            <p>Awards</p>
            </div>
        </div>
    </section>
    <button class="contact-btn">📩Contact Me</button>
</body>
</html>
